services:
  blog-db:
    image: mysql
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - '-h'
        - localhost
        - '-u'
        - root
        - '-proot'
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=blogdb
    volumes:
      - blog-db-vol:/var/lib/mysql
    ports:
      - '3307:3306'
    networks:
      - blog-app-net
  blog-server:
    image: sandipkurmi/blog-app:ee227e62923880c45ef367d3505e5aa3d7e61d77
    depends_on:
      blog-db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - http://localhost:5501/health
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - '5501:5501'
    environment:
      - PORT=5501
      - DB_HOST=blog-db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=blogdb
      - NODE_HOST=${HOSTNAME:-production}
    networks:
      - blog-app-net
  mysql-cron-backup:
    image: fradelg/mysql-cron-backup
    depends_on:
      blog-db:
        condition: service_healthy
    volumes:
      - blog-db-backup-vol:/backup
    restart: unless-stopped
    environment:
      - MYSQL_HOST=blog-db
      - MYSQL_USER=root
      - MYSQL_PASS=root
      - MAX_BACKUPS=15
      - INIT_BACKUP=0
      - CRON_TIME=* * * * *
      - GZIP_LEVEL=9
      - EXIT_BACKUP=1
    networks:
      - blog-app-net
volumes:
  blog-db-vol: null
  blog-db-backup-vol: null
networks:
  blog-app-net: null
