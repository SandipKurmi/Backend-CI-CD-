services:
    blog-db:
        image: 'mysql'
        deploy:
            replicas: 1
            update_config:
                order: start-first
                failure_action: rollback
                delay: 10s
            rollback_config:
                parallelism: 1
                order: start-first
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot']
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 30s
        environment:
            - MYSQL_ROOT_PASSWORD=root
            - MYSQL_DATABASE=blogdb
        volumes:
            - blog-db-vol:/var/lib/mysql
        ports:
            - '3307:3306'
        networks:
            - blog-app-net

    blog-server:
        image: sandipkurmi/blog-app:v1
        deploy:
            replicas: 1
            update_config:
                order: start-first
                failure_action: rollback
                delay: 10s
            rollback_config:
                parallelism: 1
                order: start-first
        healthcheck:
            test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:5501/health']
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 30s
        ports:
            - '5501:5501'
        environment:
            - PORT=5501
            - DB_HOST=blog-db
            - DB_USER=root
            - DB_PASSWORD=root
            - DB_NAME=blogdb
            - NODE_HOST={{.Node.Hostname}}
        networks:
            - blog-app-net

volumes:
  blog-db-vol: null
networks:
  blog-app-net: null
