name: CD

on:
  push:
    branches: [main, master]

jobs:
  # ── Job 1: Build image → push to Docker Hub → update compose.yaml ──────
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit updated compose.yaml back
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      IMAGE_NAME: sandipkurmi/blog-app
      IMAGE_TAG: build-${{ github.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} --platform linux/amd64 .

      - name: Push Docker image to Docker Hub
        run: docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      # Update compose.yaml with the new image tag so the server pulls the right version
      - name: Update image tag in compose.yaml
        uses: fjogeleit/yaml-update-action@v0.16.1
        with:
          valueFile: compose.yaml
          propertyPath: 'services["blog-server"].image'
          value: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          commitChange: false

      - name: Commit and push updated compose.yaml
        run: |
          git config user.name "github-actions"
          git config user.email "github-action@github.com"
          git add compose.yaml
          git commit -m "ci: bump image version to ${{ env.IMAGE_TAG }}"
          git push

  # ── Job 2: SSH to server and deploy via Docker Swarm ───────────────────
  deploy:
    name: Deploy to Docker Swarm
    runs-on: ubuntu-latest
    needs: [build-and-push]
    env:
      IMAGE_NAME: sandipkurmi/blog-app
      IMAGE_TAG: build-${{ github.run_number }}

    steps:
      - name: SSH to server and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_MANAGER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_HOST_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd ~/blog-app
            git pull origin main
            docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            docker stack deploy -c compose.yaml blog-app
